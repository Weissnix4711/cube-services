[log]
  level = "INFO"


[entryPoints]

  [entryPoints.web]
    [entryPoints.web.http.redirections.entryPoint]
      scheme = "https"
      to = ":443"

  [entryPoints.web-frp]
    address = ":80"
    proxyProtocol.trustedIPs = ["10.99.0.0/28"]
    [entryPoints.web-frp.http.redirections.entryPoint]
      scheme = "https"
      to = ":443"

  [entryPoints.websecure]
    asDefault = true
    http.middlewares = ["cf-real-ip@file", "sec-headers-all@file", "wellknown-security-txt@file"]
    http.tls.certResolver = "le"

    [entryPoints.websecure.transport.respondingTimeouts]
      idleTimeout = "600s"
      readTimeout = "600s"
      writeTimeout = "600s"

  [entryPoints.websecure-frp]
    address = ":443"
    asDefault = true
    http.middlewares = ["cf-real-ip@file", "sec-headers-all@file", "wellknown-security-txt@file"]
    http.tls.certResolver = "le"
    proxyProtocol.trustedIPs = ["10.99.0.0/28"]

  # Socket only, no address configured
  [entryPoints.ldapsecure]
  [entryPoints.sshalt]

  # FRP
  [entryPoints.imaps]
    address = ":993"
    proxyProtocol.trustedIPs = ["10.99.0.0/28"]
  [entryPoints.smtp]
    address = ":25"
    proxyProtocol.trustedIPs = ["10.99.0.0/28"]
  [entryPoints.smtps]
    address = ":465"
    proxyProtocol.trustedIPs = ["10.99.0.0/28"]


[providers.docker]
  exposedByDefault = false


[certificatesResolvers.le.acme]
  dnsChallenge.provider = "cloudflare"
  email = "aldrian.thom+letsencrypt@proton.me"
  keyType = "EC256"
  storage = "/letsencrypt/acme.json"


[api]
  disableDashboardAd = true


[ping]


[ocsp]


# Do not verify certs for kanidm (web UI and ldap) yet
[serversTransport]
  insecureSkipVerify = true


[tcpServersTransport.tls]
  insecureSkipVerify = true


[experimental.plugins]
  [experimental.plugins.traefik-oidc-auth]
    moduleName = "github.com/sevensolutions/traefik-oidc-auth"
    version = "v0.17.0"

  # Yes this is unmaintained, but there's currently no better alternative
  [experimental.plugins.cloudflarewarp]
    moduleName = "github.com/BetterCorp/cloudflarewarp"
    version = "v1.3.3"

  [experimental.plugins.security-txt]
    moduleName = "github.com/Ju0x/traefik-security-txt"
    version = "v0.1.0"


[providers.file]
  directory = "/etc/traefik/dynamic/"
